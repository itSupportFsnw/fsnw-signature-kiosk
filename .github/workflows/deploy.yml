name: Deploy to Helpdesk (FTP)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer

      - name: Install Composer dependencies (production)
        run: composer install --no-dev --optimize-autoloader --prefer-dist --no-progress

      - name: Prepare deploy folder
        run: |
          mkdir -p build/fsnw-signature-kiosk
          rsync -a --exclude-from='.distignore' ./ build/fsnw-signature-kiosk/

      - name: Plugin-Dateien via FTP übertragen
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./build/fsnw-signature-kiosk/
          # Gleicher FTP-Benutzer wie wp-fsnw-car-rent - daher derselbe absolute Pfad.
          server-dir: /hilfe.fsnw.de/wp-content/plugins/fsnw-signature-kiosk/
          protocol: ftp
